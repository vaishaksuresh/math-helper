services:
  math-helper:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=/app/data/sqlite.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/sessions"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local
